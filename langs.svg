<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
<defs>
  <linearGradient id="lbBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d0117"/>
    <stop offset="100%" stop-color="#1a0a2e"/>
  </linearGradient>
  <filter id="lbs" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000040"/>
  </filter>
</defs>
<style>
  @keyframes growLang {
    from { width: 0; }
  }
  @keyframes fadeLabel {
    from { opacity: 0; transform: translateX(-10px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .lang-label { opacity: 0; animation: fadeLabel 0.4s ease-out forwards; }
</style>

<rect width="400" height="220" rx="12" fill="url(#lbBg)" stroke="#313244" stroke-width="1" filter="url(#lbs)"/>
<text x="200" y="28" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="700"
      font-family="'Segoe UI',sans-serif" letter-spacing="1">TOP LANGUAGES</text>

<g font-family="'Segoe UI',sans-serif" transform="translate(25, 50)">
  <!-- JavaScript -->
  <text class="lang-label" x="0" y="12" fill="#cbd5e1" font-size="12" style="animation-delay:0.3s">JavaScript</text>
  <text class="lang-label" x="345" y="12" fill="#94a3b8" font-size="11" text-anchor="end" style="animation-delay:0.3s">38.2%</text>
  <rect x="0" y="18" width="350" height="8" rx="4" fill="#1e293b"/>
  <rect x="0" y="18" width="0" height="8" rx="4" fill="#f7df1e">
    <animate attributeName="width" from="0" to="134" begin="0.5s" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- Python -->
  <text class="lang-label" x="0" y="50" fill="#cbd5e1" font-size="12" style="animation-delay:0.5s">Python</text>
  <text class="lang-label" x="345" y="50" fill="#94a3b8" font-size="11" text-anchor="end" style="animation-delay:0.5s">25.6%</text>
  <rect x="0" y="56" width="350" height="8" rx="4" fill="#1e293b"/>
  <rect x="0" y="56" width="0" height="8" rx="4" fill="#3776ab">
    <animate attributeName="width" from="0" to="90" begin="0.7s" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- HTML -->
  <text class="lang-label" x="0" y="88" fill="#cbd5e1" font-size="12" style="animation-delay:0.7s">HTML</text>
  <text class="lang-label" x="345" y="88" fill="#94a3b8" font-size="11" text-anchor="end" style="animation-delay:0.7s">18.4%</text>
  <rect x="0" y="94" width="350" height="8" rx="4" fill="#1e293b"/>
  <rect x="0" y="94" width="0" height="8" rx="4" fill="#e34f26">
    <animate attributeName="width" from="0" to="64" begin="0.9s" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- CSS -->
  <text class="lang-label" x="0" y="126" fill="#cbd5e1" font-size="12" style="animation-delay:0.9s">CSS</text>
  <text class="lang-label" x="345" y="126" fill="#94a3b8" font-size="11" text-anchor="end" style="animation-delay:0.9s">12.1%</text>
  <rect x="0" y="132" width="350" height="8" rx="4" fill="#1e293b"/>
  <rect x="0" y="132" width="0" height="8" rx="4" fill="#264de4">
    <animate attributeName="width" from="0" to="42" begin="1.1s" dur="0.8s" fill="freeze"/>
  </rect>

  <!-- TypeScript -->
  <text class="lang-label" x="0" y="164" fill="#cbd5e1" font-size="12" style="animation-delay:1.1s">TypeScript</text>
  <text class="lang-label" x="345" y="164" fill="#94a3b8" font-size="11" text-anchor="end" style="animation-delay:1.1s">5.7%</text>
  <rect x="0" y="170" width="350" height="8" rx="4" fill="#1e293b"/>
  <rect x="0" y="170" width="0" height="8" rx="4" fill="#3178c6">
    <animate attributeName="width" from="0" to="20" begin="1.3s" dur="0.8s" fill="freeze"/>
  </rect>
</g>
</svg>
