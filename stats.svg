<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="520" height="280">
<defs>
  <linearGradient id="sgBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d0117"/>
    <stop offset="100%" stop-color="#1a0a2e"/>
  </linearGradient>
  <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#f472b6"/>
    <stop offset="100%" stop-color="#818cf8"/>
  </linearGradient>
  <filter id="sg" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000040"/>
  </filter>
</defs>
<style>
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes rankPop {
    0%   { opacity: 0; transform: scale(0); }
    60%  { opacity: 1; transform: scale(1.2); }
    100% { opacity: 1; transform: scale(1); }
  }
  .stat-row { opacity: 0; animation: fadeIn 0.5s ease-out forwards; }
  .stat-num { opacity: 0; animation: fadeIn 0.3s ease-out forwards; }
</style>

<!-- Card -->
<rect width="520" height="280" rx="12" fill="url(#sgBg)" stroke="#313244" stroke-width="1" filter="url(#sg)"/>

<!-- Title -->
<text x="260" y="30" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="700"
      font-family="'Segoe UI',sans-serif" letter-spacing="1">GITHUB STATS</text>

<!-- Rank Ring -->
<g transform="translate(85, 160)">
  <circle cx="0" cy="0" r="54" fill="none" stroke="#1e293b" stroke-width="8"/>
  <circle cx="0" cy="0" r="54" fill="none" stroke="url(#ringGrad)" stroke-width="8"
          stroke-dasharray="340" stroke-dashoffset="340" stroke-linecap="round"
          transform="rotate(-90)">
    <animate attributeName="stroke-dashoffset" from="340" to="75" begin="0.5s" dur="1.5s" fill="freeze"/>
  </circle>
  <text x="0" y="5" text-anchor="middle" fill="#f472b6" font-size="30" font-weight="900"
        font-family="'Segoe UI',sans-serif" opacity="0" style="animation: rankPop 0.5s ease-out 1.8s forwards;">A+</text>
  <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="10"
        font-family="'Segoe UI',sans-serif" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.3s" fill="freeze"/>
    Top 15%
  </text>
</g>

<!-- Stat rows — each row uses SMIL opacity, no CSS transform to avoid conflict -->
<g font-family="'Segoe UI',sans-serif" font-size="13">

  <!-- Row 1: Stars -->
  <text x="180" y="74" fill="#cbd5e1" opacity="0">⭐ Total Stars
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="480" y="74" text-anchor="end" fill="#f472b6" font-weight="700" opacity="0">12
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- Row 2: Commits -->
  <text x="180" y="114" fill="#cbd5e1" opacity="0">🔥 Total Commits
    <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="480" y="114" text-anchor="end" fill="#f472b6" font-weight="700" opacity="0">247
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- Row 3: PRs -->
  <text x="180" y="154" fill="#cbd5e1" opacity="0">🔀 Pull Requests
    <animate attributeName="opacity" from="0" to="1" begin="1.2s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="480" y="154" text-anchor="end" fill="#f472b6" font-weight="700" opacity="0">18
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- Row 4: Issues -->
  <text x="180" y="194" fill="#cbd5e1" opacity="0">❗ Issues
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="480" y="194" text-anchor="end" fill="#f472b6" font-weight="700" opacity="0">5
    <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- Row 5: Contributed to -->
  <text x="180" y="234" fill="#cbd5e1" opacity="0">📦 Contributed to
    <animate attributeName="opacity" from="0" to="1" begin="1.6s" dur="0.4s" fill="freeze"/>
  </text>
  <text x="480" y="234" text-anchor="end" fill="#f472b6" font-weight="700" opacity="0">3
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.3s" fill="freeze"/>
  </text>

  <!-- Subtle separator lines -->
  <line x1="180" y1="84" x2="480" y2="84" stroke="#313244" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="0.8s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="180" y1="124" x2="480" y2="124" stroke="#313244" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="1.0s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="180" y1="164" x2="480" y2="164" stroke="#313244" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="1.2s" dur="0.3s" fill="freeze"/>
  </line>
  <line x1="180" y1="204" x2="480" y2="204" stroke="#313244" stroke-width="0.5" opacity="0">
    <animate attributeName="opacity" from="0" to="0.5" begin="1.4s" dur="0.3s" fill="freeze"/>
  </line>
</g>
</svg>
