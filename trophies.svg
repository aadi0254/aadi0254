<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 240" width="820" height="240">
<defs>
  <linearGradient id="trBg" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#0d0117"/>
    <stop offset="100%" stop-color="#1a0a2e"/>
  </linearGradient>
  <linearGradient id="shineGrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="rgba(255,255,255,0)">
      <animate attributeName="offset" values="-0.3;1.3" dur="4s" repeatCount="indefinite"/>
    </stop>
    <stop offset="10%" stop-color="rgba(255,255,255,0.12)">
      <animate attributeName="offset" values="-0.2;1.4" dur="4s" repeatCount="indefinite"/>
    </stop>
    <stop offset="20%" stop-color="rgba(255,255,255,0)">
      <animate attributeName="offset" values="-0.1;1.5" dur="4s" repeatCount="indefinite"/>
    </stop>
  </linearGradient>
  <filter id="tglow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="ts" x="-5%" y="-5%" width="110%" height="110%">
    <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000040"/>
  </filter>
</defs>
<style>
  @keyframes trophyPop {
    0%   { opacity: 0; transform: scale(0) translateY(20px); }
    60%  { opacity: 1; transform: scale(1.1) translateY(-5px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .trophy-cell { opacity: 0; animation: trophyPop 0.5s ease-out forwards; }
  @keyframes rankGlow {
    0%,100% { opacity: 0.8; }
    50%     { opacity: 1; filter: url(#tglow); }
  }
  .rank-text { animation: rankGlow 2s ease-in-out infinite; }
</style>

<rect width="820" height="240" rx="12" fill="url(#trBg)" stroke="#313244" stroke-width="1" filter="url(#ts)"/>
<text x="410" y="28" text-anchor="middle" fill="#c084fc" font-size="14" font-weight="700"
      font-family="'Segoe UI',sans-serif" letter-spacing="1">TROPHIES</text>

<!-- Trophy cells — each cell is 100×160 with generous inner spacing -->
<g font-family="'Segoe UI',sans-serif">

  <!-- MultiLanguage -->
  <g class="trophy-cell" style="animation-delay:0.3s" transform="translate(15, 42)">
    <rect x="0" y="0" width="108" height="170" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="54" y="42" text-anchor="middle" font-size="36">🏆</text>
    <text class="rank-text" x="54" y="80" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="900">S</text>
    <text x="54" y="115" text-anchor="middle" fill="#cbd5e1" font-size="11">MultiLang</text>
    <text x="54" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">5+ languages</text>
  </g>

  <!-- Stars -->
  <g class="trophy-cell" style="animation-delay:0.5s" transform="translate(131, 42)">
    <rect x="0" y="0" width="108" height="170" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="54" y="42" text-anchor="middle" font-size="36">⭐</text>
    <text class="rank-text" x="54" y="80" text-anchor="middle" fill="#c084fc" font-size="16" font-weight="900">A</text>
    <text x="54" y="115" text-anchor="middle" fill="#cbd5e1" font-size="11">Stars</text>
    <text x="54" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">10+ stars</text>
  </g>

  <!-- Commits -->
  <g class="trophy-cell" style="animation-delay:0.7s" transform="translate(247, 42)">
    <rect x="0" y="0" width="108" height="170" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="54" y="42" text-anchor="middle" font-size="36">🔥</text>
    <text class="rank-text" x="54" y="80" text-anchor="middle" fill="#f472b6" font-size="16" font-weight="900">A+</text>
    <text x="54" y="115" text-anchor="middle" fill="#cbd5e1" font-size="11">Commits</text>
    <text x="54" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">200+ commits</text>
  </g>

  <!-- PRs -->
  <g class="trophy-cell" style="animation-delay:0.9s" transform="translate(363, 42)">
    <rect x="0" y="0" width="108" height="170" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="54" y="42" text-anchor="middle" font-size="36">🔀</text>
    <text class="rank-text" x="54" y="80" text-anchor="middle" fill="#818cf8" font-size="16" font-weight="900">A</text>
    <text x="54" y="115" text-anchor="middle" fill="#cbd5e1" font-size="11">PRs</text>
    <text x="54" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">15+ merged</text>
  </g>

  <!-- Repos -->
  <g class="trophy-cell" style="animation-delay:1.1s" transform="translate(479, 42)">
    <rect x="0" y="0" width="108" height="170" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="54" y="42" text-anchor="middle" font-size="36">📁</text>
    <text class="rank-text" x="54" y="80" text-anchor="middle" fill="#4ade80" font-size="16" font-weight="900">B</text>
    <text x="54" y="115" text-anchor="middle" fill="#cbd5e1" font-size="11">Repos</text>
    <text x="54" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">5+ repos</text>
  </g>

  <!-- Followers -->
  <g class="trophy-cell" style="animation-delay:1.3s" transform="translate(595, 42)">
    <rect x="0" y="0" width="108" height="170" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="54" y="42" text-anchor="middle" font-size="36">👥</text>
    <text class="rank-text" x="54" y="80" text-anchor="middle" fill="#f9a8d4" font-size="16" font-weight="900">B</text>
    <text x="54" y="115" text-anchor="middle" fill="#cbd5e1" font-size="11">Followers</text>
    <text x="54" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">Growing!</text>
  </g>

  <!-- Experience -->
  <g class="trophy-cell" style="animation-delay:1.5s" transform="translate(711, 42)">
    <rect x="0" y="0" width="108" height="170" rx="8" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>
    <text x="54" y="42" text-anchor="middle" font-size="36">🎓</text>
    <text class="rank-text" x="54" y="80" text-anchor="middle" fill="#fbbf24" font-size="16" font-weight="900">S</text>
    <text x="54" y="115" text-anchor="middle" fill="#cbd5e1" font-size="11">Experience</text>
    <text x="54" y="140" text-anchor="middle" fill="#94a3b8" font-size="9">Full Stack</text>
  </g>
</g>

<!-- Shine sweep overlay -->
<rect width="820" height="240" rx="12" fill="url(#shineGrad)" opacity="0.5"/>
</svg>
